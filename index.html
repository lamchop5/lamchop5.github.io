<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Load Tesseract.js from CDN -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.8/css/dataTables.dataTables.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7" charset="utf-8"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>    
    <script src="https://cdn.datatables.net/2.3.8/js/dataTables.min.js"></script>
    
    <title>OpenCV.js Video Processor</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: #fff; padding: 20px; text-align: center;}
        .axis path, .axis line { stroke: #555; }
        .axis text { fill: #aaa; font-size: 12px; }
        
        .container { margin-top: 20px; }
        canvas { border: 1px solid #ccc; max-width: 100%; }
        #loading { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Chaos Belt Damage Scanner</h2>
    <p id="loading">Loading OpenCV.js...</p>
    <div id="chart"></div>
    <div id="download"></div>
    <div id="results"></div>
    
    <!-- <table id="dataTable"></table> -->

    <!-- File Input -->
    <input type="file" id="videoUpload" accept="video/*" disabled>    
    <label for="speedDropdown">Playback Speed:</label>
    <select id="speedDropdown">
        <option value="1">1x</option>
        <option value="2">2x</option>
        <option value="3" selected>2.5x</option>
        <option value="4">3x</option>
        <option value="5">4x</option>
    </select>
    
    <div class="container">
        <!-- Hidden video element used as the data source -->
        <video id="videoElement" width="640" height="480" muted playsinline style="display:none;"></video>
        <!-- Canvas where OpenCV.js renders the processed frames -->
        <canvas id="canvasOutput" width="640" height="480" style="display:none;"></canvas>
    </div>
    <div><p>Belt Damage</p><canvas id="iconOutput" width="50" height="50"></canvas></div>
    <!-- Counter display -->
    <p>Current Frame: <span id="frameCount">0</span></p>
    <div id="outputLog"></div>

    <!-- Script to handle Video and OpenCV.js Logic -->
    <script>
        (function() {
            const originalGetContext = HTMLCanvasElement.prototype.getContext;
            HTMLCanvasElement.prototype.getContext = function(type, attributes) {
                if (type === '2d') {
                    attributes = attributes || {};
                    attributes.willReadFrequently = true;
                }
                return originalGetContext.call(this, type, attributes);
            };
        })();
        
        let video = document.getElementById('videoElement');
        let icon = document.getElementById('iconOutput');
        let fileInput = document.getElementById('videoUpload');
        let loadingText = document.getElementById('loading');
        let statusText = document.getElementById('statusDisplay');
        let outputText = document.getElementById('outputDisplay');
        let resultsElement = document.getElementById('results');
        // Initialize your framework counter variable
        let frameCounter = 0;
        const counterDisplay = document.getElementById('frameCount');

        let cap = null;            // opencv video capture stream
        let src = null;            // opencv source mat (input)
        let dst = null;            // opencv destination mat (result)
        let startFrame = 0;        // frame where initial hp bar spawns
        let startTime = 0;
        let iconRect = null;
        let iconCrop = null;
        let iconData={x:null, y:null, w:null, h:null};
        let kernel = null;

        //let table = new DataTable('#dataTable');

        const data = [];        // raw data, seconds  = x.xxx

        function downloadJSON(dataObject, filename = 'data.json') {
            // 1. Convert the JavaScript object into a formatted JSON string
            const jsonString = JSON.stringify(dataObject, null, 2);

            // 2. Wrap the string inside a Blob with the proper JSON MIME type
            const blob = new Blob([jsonString], { type: 'application/json;charset=utf-8' });

            // 3. Create a temporary, localized DOM URL pointing to the Blob
            const blobUrl = URL.createObjectURL(blob);

            // 4. Create an invisible anchor ('a') element
            const link = document.createElement('a');
            link.href = blobUrl;
            link.download = filename; // Sets the native file saving destination name

            // 5. Inject element to DOM, simulate click, and immediately sweep it
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // 6. Free up internal browser memory allocation by revoking the URL
            URL.revokeObjectURL(blobUrl);
        }

        // 1. Triggered when OpenCV.js is fully loaded and ready
        function onOpenCvReady() {
            // Wait for the runtime to finish initialization
            cv['onRuntimeInitialized'] = () => {
                loadingText.innerText = "OpenCV.js is ready! Upload a video.";
                loadingText.style.color = "green";
                fileInput.disabled = false;
                kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3, 3))
            }        
        }

        // 2. Handle file selection and video playback
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Create local URL for the uploaded video file
            const fileURL = URL.createObjectURL(file);
            video.src = fileURL;
            
            // Stop any previous processing loops safely
            isProcessing = false; 
            startFrame = 0;
            log = "";

            // Wait for video metadata to load so dimensions are correct
            video.onloadedmetadata = () => {
                video.width = video.videoWidth;
                video.height = video.videoHeight;
                document.getElementById('canvasOutput').width = video.videoWidth;
                document.getElementById('canvasOutput').height = video.videoHeight;

                // Initialize OpenCV matrices with matching dimensions
                if (src) src.delete();
                if (dst) dst.delete();
                
                src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
                dst = new cv.Mat(video.height, video.width, cv.CV_8UC1); // CV_8UC1 for Grayscale
                cap = new cv.VideoCapture(video);
                // Start playing and processing
                video.play();
                isProcessing = true;
                //setTimeout(processVideo,0,0);
                requestAnimationFrame(processVideo);
            };
        });

        // 3. The OpenCV.js processing loop
        async function processVideo() {
            if (video.ended) {
                src.delete();
                dst.delete();
                iconCrop.delete();
                const reducedData = Object.values(data.reduce((acc, curr) => {
                    const wholeSecond = Math.floor(curr.x);
                    if (!acc[wholeSecond]) {
                        acc[wholeSecond] = { x: wholeSecond, y: curr.y };
                    }
                    return acc;
                }, {}));
                //graph_chart(data);
                graph_chart(reducedData);

                const laserPercents = [];
                const cooldownPercents = [];
                const intervalCounts = {};
                const droppedFrames =[]

                for (const row of reducedData) {
                    if (row.x>=2) {
                        const time_mod_20 = (row.x-2) % 20;
                        if (time_mod_20 < 10) {laserPercents.push(row.y);}
                        else {cooldownPercents.push(row.y);}

                        const dmgPercent = (Math.floor(row.y/10)*10);
                        if (dmgPercent in intervalCounts) {intervalCounts[dmgPercent]++}
                        else {intervalCounts[dmgPercent]=1}
                    }
                }
                console.log(intervalCounts)

                for (let i = 0; i < 182; i++) {
                    if (!reducedData.some(row => row.x === i)) {
                        droppedFrames.push(i)
                    } 
                }

                console.log("droppedFrames: " + droppedFrames)

                const combined = [...laserPercents, ...cooldownPercents];
                const avgBelt = Math.floor(combined.reduce((sum, num) => sum + num, 0) / combined.length *1000)/1000;
                const laserBelt = Math.floor(laserPercents.reduce((sum, num) => sum + num, 0) / laserPercents.length*1000)/1000;
                const nonlaserBelt = Math.floor(cooldownPercents.reduce((sum, num) => sum + num, 0) / cooldownPercents.length*1000)/1000;

                const jsonString = JSON.stringify(data, null, 4);
                results.innerText = "\nAverage Belt%: " + avgBelt +"\n\nAverage Belt% (Laser Charging): " + laserBelt +"\n\nAverage Belt% (Not Charging): " + nonlaserBelt +"\n\nMissing Seconds(Dropped Frames): " + droppedFrames.length + "/182\n\n\n\n";

                const downloadDiv = document.getElementById('download');
                const downloadButton = document.createElement('button');
                downloadButton.innerText = 'Download Data';
                downloadButton.type = 'button'; // Explicitly set type to prevent accidental form submits
                downloadButton.classList.add('btn-primary'); // Add CSS styling class

                downloadButton.addEventListener('click', function() {
                    downloadJSON(data,"data.json");
                });
                downloadDiv.appendChild(downloadButton);
                //gen_datatable(reducedData);
                return;
            }

            try {
                cap.read(src);
                frameCounter++;
                counterDisplay.innerText = frameCounter;

                //cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
                cv.imshow('canvasOutput', src);
                if (startFrame == 0) {
                    // check for first hp bar
                    if (checkStart(src)) {
                        log = "found initial hp bar at frame " + frameCounter + ": " +video.currentTime
                        startFrame = frameCounter;
                        startTime = video.currentTime;
                        // scan for icon contours
                        iconData = findCbeltIcon(src);
                        console.log(iconData);
                        iconRect = new cv.Rect(iconData.x, iconData.y, iconData.w, iconData.h);
                        iconCrop = src.roi(iconRect);
                        icon.width = iconData.width;
                        icon.height = iconData.height;
                        cv.imshow('iconOutput', iconCrop);
                        iconCrop.delete();
                        const ocr_text = await preprocessAndOCR(icon);
                        video.pause();
                        video.playbackRate = parseFloat(document.getElementById("speedDropdown").value);
                        video.play();
                    }
                    //setTimeout(processVideo,0,2);
                    requestAnimationFrame(processVideo);
                    return;
                } else {
                    iconCrop = src.roi(iconRect);                    
                    cv.imshow('iconOutput', iconCrop);

                    const logIcon = document.createElement("canvas")
                    const ocrpreprocessIcon = document.createElement("canvas")
                    const newLogRow = document.createElement("div");

                    const ocr_data = await preprocessAndOCR(icon, ocrpreprocessIcon);
                    logIcon.width = iconData.w
                    logIcon.height = iconData.h
                    cv.imshow(logIcon, iconCrop);
                    //const logIconCtx = logIcon.getContext('2d');
                    //logIconCtx.drawImage(document.getElementById('iconOutput'), 0, 0);
                    newLogRow.textContent ="encounter time: " + Math.round((video.currentTime-startTime)*1000)/1000 +", ocr: " + ocr_data.text;
                    newLogRow.appendChild(logIcon)
                    newLogRow.appendChild(ocrpreprocessIcon)
                    if (ocr_data.confidence >= 80) {
                        data.push({ x: Math.round((video.currentTime-startTime)*1000)/1000, y: parseFloat(ocr_data.text) })
                        newLogRow.style.color = 'green';
                    } else {
                        newLogRow.style.color = 'crimson';
                    }
                    outputLog.appendChild(newLogRow);
                    //setTimeout(processVideo,0,1);
                    requestAnimationFrame(processVideo);                
                }
                
            } catch (err) {
                console.error("OpenCV Error: ", err);
                isProcessing = false;
            }
        }

        async function preprocessAndOCR(imgElement, preprocessIcon) {
            //statusText.innerText = 'Preprocessing image with OpenCV...';
            let source = cv.imread(imgElement);
            let dest = new cv.Mat();
            let dsize = new cv.Size(source.cols * 3, source.rows * 3);
            cv.resize(source, dest, dsize, 0, 0, cv.INTER_CUBIC);

            dest = filterImage(dest, [245,245,235,128], [10,10,20,128])
            cv.bitwise_not(dest, dest);
            let dilated = new cv.Mat();
            
            let kernelSize = new cv.Size(7, 7);
            let kernel = cv.getStructuringElement(cv.MORPH_RECT, kernelSize);
            let anchor = new cv.Point(-1, -1); // Center of the kernel

            // 4. Apply dilation
            cv.dilate(dest, dilated, kernel, anchor, 1, cv.BORDER_CONSTANT, cv.morphologyDefaultBorderValue());
            cv.bitwise_not(dilated, dilated);
            cv.copyMakeBorder(dilated, dilated, 20, 20, 20, 20, cv.BORDER_CONSTANT, value = new cv.Scalar(255));
            cv.imshow('iconOutput', dilated);

            dsize = new cv.Size(source.cols, source.rows);
            cv.resize(dilated, dest, dsize, 0, 0, cv.INTER_AREA);

            if (preprocessIcon) {
                preprocessIcon.width = dest.cols;
                preprocessIcon.height = dest.rows;
                cv.imshow(preprocessIcon, dest);
            }            

            try {
                const result = await Tesseract.recognize(iconOutput, 'eng');

                if (result.data.confidence < 90){
                    console.log("confidence < 90, ocr on source")
                    const result = await Tesseract.recognize(imgElement, 'eng')
                    console.log("source ocr: " + result.data.text)
                }

                // Clean up memory from WebAssembly heap
                dilated.delete();
                dest.delete();
                kernel.delete();
                source.delete();

                return result.data || "[No text detected]";
            } catch (error) {
                console.error(error);
            }
        }

        const getAverageByRange = (arr, min, max) => {
            // Filter where first element is between min and max (inclusive)
            const filtered = arr.filter(row => row.x >= min && row.x <= max);

            if (filtered.length === 0) return 0; // Prevent division by zero

            // Sum up the values at the specified target index
            const sum = filtered.reduce((acc, row) => acc + row.y, 0);

            // Return the average
            return sum / filtered.length;
        };

        function graph_chart(data) {
            // Dimensions
            const margin = { top: 30, right: 30, bottom: 50, left: 50 };
            const width = 1200 - margin.left - margin.right;
            const height = 400 - margin.top - margin.bottom;

            // Append SVG
            const svg = d3.select("#chart")
                .append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g")
                .attr("transform",`translate(${margin.left},${margin.top})`);

            // 2. Scales & Axes
            const xScale = d3.scaleLinear()
                .domain(d3.extent(data, d => d.x))
                .range([0, width]);

            const yScale = d3.scaleLinear()
                //.domain([0, d3.max(data, d => d.y)])
                .domain([70, d3.max(data, d => d.y)])
                .range([height, 0]);

            svg.append("g")
                .attr("class", "axis")
                .attr("transform", `translate(0, ${height})`)
                .call(d3.axisBottom(xScale));

            svg.append("g")
                .attr("class", "axis")
                .call(d3.axisLeft(yScale));

            // 3. Define Gradients in <defs>
            const defs = svg.append("defs");

            // Color configurations mapped to the Y-axis value bounds
            const colorMin = "#3a86ff"; // Cold / Low Value (Blue)
            const colorMax = "#ff006e"; // Hot / High Value (Red)

            // LINE STROKE GRADIENT (Vertical: shifts color relative to Y position)
            const lineGradient = defs.append("linearGradient")
                .attr("id", "line-gradient")
                .attr("gradientUnits", "userSpaceOnUse")
                .attr("x1", 0).attr("y1", yScale(70))
                .attr("x2", 0).attr("y2", yScale(d3.max(data, d => d.y)));

            lineGradient.append("stop").attr("offset", "0%").attr("stop-color", colorMin);
            lineGradient.append("stop").attr("offset", "100%").attr("stop-color", colorMax);

            // AREA FILL GRADIENT (Vertical: fades down to transparent background)
            const areaGradient = defs.append("linearGradient")
                .attr("id", "area-gradient")
                .attr("gradientUnits", "userSpaceOnUse")
                .attr("x1", 0).attr("y1", yScale(0))
                .attr("x2", 0).attr("y2", yScale(d3.max(data, d => d.y)));

            areaGradient.append("stop").attr("offset", "0%").attr("stop-color", colorMin).attr("stop-opacity", 0.0);
            areaGradient.append("stop").attr("offset", "100%").attr("stop-color", colorMax).attr("stop-opacity", 0.4);

            // 4. Generators
            const lineGenerator = d3.line()
                .x(d => xScale(d.x))
                .y(d => yScale(d.y))
                .curve(d3.curveMonotoneX); // Smooth interpolation

            const areaGenerator = d3.area()
                .x(d => xScale(d.x))
                .y0(height) // Baseline bottom boundary
                .y1(d => yScale(d.y))
                .curve(d3.curveMonotoneX);

            // 5. Draw Shapes
            // Draw Area First (so the line sits cleanly on top)
            svg.append("path")
                .datum(data)
                .attr("d", areaGenerator)
                .style("fill", "url(#area-gradient)");

            // Draw Line
            svg.append("path")
                .datum(data)
                .attr("d", lineGenerator)
                .style("fill", "none")
                .style("stroke", "url(#line-gradient)")
                .style("stroke-width", 1);


            const highlightGroup = svg.append("g")
            .attr("class", "highlight-intervals");

        
            // highlight intervals
            const intervals = [
                { start: 2, end: 12, avg: getAverageByRange(data,2,11) },
                { start: 22, end: 32, avg: getAverageByRange(data,22,31) },
                { start: 42, end: 52, avg: getAverageByRange(data,42,51) },
                { start: 62, end: 72, avg: getAverageByRange(data,62,71) },
                { start: 82, end: 92, avg: getAverageByRange(data,82,91) },
                { start: 102, end: 112, avg: getAverageByRange(data,102,111) },
                { start: 122, end: 132, avg: getAverageByRange(data,122,131) },
                { start: 142, end: 152, avg: getAverageByRange(data,142,151) },
                { start: 162, end: 172, avg: getAverageByRange(data,162,171) }
            ]

            const tooltip = d3.select("body").append("div")
            .attr("class", "tooltip")
            .style("position", "absolute")
            .style("opacity", 0);

            highlightGroup.selectAll("rect")
            .data(intervals)
            .join("rect")
                .attr("x", d => xScale(d.start))
                .attr("y", d => yScale(d.avg)) // Starts at the top of the chart (or margin.top)
                .attr("width", d => xScale(d.end) - xScale(d.start))
                //.attr("height", height) // Extends the full height of the chart area
                .attr("height", d => height - yScale(d.avg)) // Extends the full height of the chart area
                .attr("fill", "#ffcccb") // Highlight color
                .attr("opacity", 0.10)    // Adjust transparency so chart lines remain visible
                .attr("pointer-events", "all") // Ensures tooltips can pass through the highlights
                .on("mousemove", function(event) {
                    // Get mouse x-coordinate and map to data space
                    const [xCoord] = d3.pointer(event, this);
                    const mouseX = xScale.invert(xCoord);

                    // Find which interval is currently being hovered
                    const activeInterval = intervals.find(d => mouseX >= d.start && mouseX < d.end);

                    if (activeInterval) {
                    // Highlight the intervals (e.g., using classes)
                    d3.selectAll(".interval-bar").classed("highlight", d => d === activeInterval);

                    // Show tooltip with interval average
                    tooltip.transition().duration(200).style("opacity", 0.9);
                    tooltip.html(`Interval: ${activeInterval.start}-${activeInterval.end}<br/>Avg: ${activeInterval.avg.toFixed(1)}`)
                        .style("left", (event.pageX + 10) + "px")
                        .style("top", (event.pageY - 28) + "px");
                    }
                })
                .on("mouseout", function() {
                    d3.selectAll(".interval-bar").classed("highlight", false);
                    tooltip.transition().duration(500).style("opacity", 0);
                });

            // This allows to find the closest X index of the mouse:
            var bisect = d3.bisector(function(d) { return d.x; }).left;

            // Create the circle that travels along the curve of chart
            var focus = svg
                .append('g')
                .append('circle')
                .style("fill", "none")
                .attr("stroke", "white")
                .attr('r', 4.5)
                .style("opacity", 0)

            // Create the text that travels along the curve of chart
            var focusText = svg
                .append('g')
                .append('text')
                .style("opacity", 0)
                .attr("fill", "white")
                .attr("text-anchor", "left")
                .attr("alignment-baseline", "middle")

            // Create a rect on top of the svg area: this rectangle recovers mouse position
            svg
                .append('rect')
                .style("fill", "none")
                .style("pointer-events", "all")
                .attr('width', width)
                .attr('height', height)
                .on('mouseover', mouseover)
                .on('mousemove', mousemove)
                .on('mouseout', mouseout);


            // What happens when the mouse move -> show the annotations at the right positions.
            function mouseover() {
                focus.style("opacity", 1)
                focusText.style("opacity",1)
            }

            function mousemove() {
                // recover coordinate we need
                const [xCoord] = d3.pointer(event, this);
                var x0 = xScale.invert(xCoord);
                var i = bisect(data, x0, 1);
                selectedData = data[i]
                console.log("data[i]: ", data[i])
                focus
                .attr("cx", xScale(selectedData.x))
                .attr("cy", yScale(selectedData.y))
                focusText
                .html(selectedData.x + "s: " + selectedData.y +"%")
                .attr("x", xScale(selectedData.x)+15)
                .attr("y", yScale(selectedData.y))
                }
            function mouseout() {
                focus.style("opacity", 0)
                focusText.style("opacity", 0)
            }


        } // end chart_data()

        function gen_datatable(data) {
            const reducedData = [];
            for (const row of data) {
                const dmgInterval = Math.floor(row.y/10)
                const index = reducedData.findIndex(subList => subList[0] === dmgInterval);
                if (index == -1) {
                    reducedData.push([dmgInterval, 1])
                } else {
                    reducedData[index][1]++
                }
            }
            console.log(reducedData)
            return reducedData;
        }
    </script>

    <!-- Async load OpenCV.js from a reliable CDN -->
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onOpenCvReady();"></script>
    <script src="video.js"></script>

</body>
</html>
